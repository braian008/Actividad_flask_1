{% extends "layout.html" %}
{% block body %}
<div class="row">
    <!-- Columna del Formulario -->
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <form action="{{url_for('add_contact')}}" method="POST">
                    <div class="mb-3">
                        <input class="form-control" type="text" name="nombre" placeholder="Nombre completo" required>
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="tel" name="tel" placeholder="Teléfono" required>
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-success" type="submit">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Columna de la Tabla -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre completo</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for contacto in contactos %}
                        <tr>
                            <td>{{contacto.0}}</td>
                            <td>{{contacto.1}}</td>
                            <td>{{contacto.2}}</td>
                            <td>{{contacto.3}}</td>
                            <td>
                                <a class="btn btn-sm btn-info" href="{{url_for('conseguir_contacto',id=contacto.0)}}">Editar</a>
                                <a class="btn btn-sm btn-danger" href="{{url_for('borrar_contacto',id=contacto.0)}}">Borrar</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
