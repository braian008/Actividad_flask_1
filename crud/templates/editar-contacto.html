{% extends "layout.html" %} 
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-4">
            <div class="card-header bg-info text-white">Editar Contacto</div>
            <div class="card-body">
                <form action="{{url_for('actualizar_contacto',id=contacto.0)}}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input class="form-control" type="text" name="nombre" value="{{contacto.1}}" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" type="text" name="tel" value="{{contacto.2}}" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" value="{{contacto.3}}" required />
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-info text-white" type="submit">Actualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
