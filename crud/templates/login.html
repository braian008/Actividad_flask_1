{% extends "layout.html" %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-header bg-dark text-white">Iniciar Sesión</div>
            <div class="card-body">
                <form method="POST" action="{{url_for('login')}}">
                    <div class="mb-3">
                        <input class="form-control" autofocus name="usuario" placeholder="Usuario" type="text" required>
                    </div>
                    <div class="mb-3">
                        <input class="form-control" name="password" placeholder="Contraseña" type="password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <button class="btn btn-primary" type="submit">Aceptar</button>
                        <a href="{{url_for('registrar')}}" class="text-decoration-none">Registrarse</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
